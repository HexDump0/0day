<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>idea 06 — one continuous pull-back</title>
<link rel="stylesheet" href="common.css">
<style>
  #cam { position: absolute; inset: 0; will-change: transform; }
  .tile {
    position: absolute; width: 224px; height: 126px;
    border: 1px solid rgba(232,231,224,.14); background: #131310;
    display: flex; align-items: center; justify-content: center;
    visibility: hidden; overflow: hidden;
  }
  .tile img {
    width: 100%; height: 100%; object-fit: cover;
    filter: grayscale(1) contrast(1.05) brightness(.85);
  }
  .tile .nm {
    font-family: 'Doto', monospace; font-variation-settings: 'wght' 900;
    font-size: 30px; color: rgba(232,231,224,.6); white-space: nowrap;
  }
  .tile.on { visibility: visible; }
  .tile.fresh { border-color: var(--acid); z-index: 5; }
  .tile.fresh .nm { color: var(--fg); }
  #grid.dimmed .tile { opacity: .35; }

  #slam {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; visibility: hidden; z-index: 40;
  }
  #slam .big { font-size: 340px; line-height: 1; color: var(--fg);
    text-shadow: 0 0 100px rgba(0,0,0,.95); }
  #slam .sub { font-size: 40px; color: var(--dim); margin-top: 14px; }
</style>
</head>
<body>
<div class="viewport"><div class="stage">
  <div class="punch" id="punch">
    <div id="cam"><div id="grid" style="position:absolute; inset:0;"></div></div>
    <div id="slam">
      <div class="big doto">170+</div>
      <div class="sub mono">programs shipped</div>
    </div>
  </div>
  <div class="hud" style="top:60px; right:100px;">programs_shipped: <span class="val" id="counter">090</span></div>
  <div class="chrome"><div class="lines"></div><div class="vig"></div></div>
  <div class="tag-mock">MOCKUP 06 — one continuous pull-back: the catalog grows from a single program to a wall</div>
  <button class="replay">replay (r)</button>
</div></div>

<script src="common.js"></script>
<script>
const A = '../../public/assets/ysws/';
const ART = ['stardance','macondo','forge','game','horizons','blueprint','anvil'];
const NAMES = [
  'Midnight','Juice','Neighborhood','Highway','Boot','HomeLab','Hackvault',
  'Outpost','Reboot','HackCraft','Lumen','Swirl','Scraps','Slushies','Fallout',
  'Stasis','Polygon','Keeb','Noodles','Pxl','Meow','Woof','Bauble','Fudge',
  'Onboard','Sprig','Blot','Cider','Burrow','Solder','Hackpad','Moonbeam',
  'Cascade','Epoch','Trail','Asylum','Counterspell','Scrapyard','Toppings','Bin','Riceathon',
];
/* 8x6 grid; tiles claim slots spiralling out from the center, art first */
const COLS = 8, ROWS_N = 6, TW = 232, TH = 134;
const X0 = (1920 - COLS * TW) / 2, Y0 = (1080 - ROWS_N * TH) / 2;
const slots = [];
for (let r = 0; r < ROWS_N; r++) for (let c = 0; c < COLS; c++) slots.push({r, c});
slots.sort((a, b) => {
  const d = (s) => Math.hypot(s.c - (COLS - 1) / 2, s.r - (ROWS_N - 1) / 2);
  return d(a) - d(b);
});
const ITEMS = [
  ...ART.map((slug) => ({slug})),
  ...NAMES.map((name) => ({name})),
].slice(0, slots.length);
/* art 1/beat, names sprint 2/beat → 4/beat, camera never stops */
const times = ITEMS.map((_, i) =>
  i < 7 ? beat(i)
  : i < 19 ? beat(7 + (i - 7) * 0.5)
  : beat(13 + (i - 19) * 0.25));
const T_SLAM = beat(21);
const LOOP   = beat(29);

const grid = document.getElementById('grid');
const els = ITEMS.map((it, i) => {
  const s = slots[i];
  const d = document.createElement('div');
  d.className = 'tile';
  d.style.left = `${X0 + s.c * TW}px`;
  d.style.top = `${Y0 + s.r * TH}px`;
  d.innerHTML = it.slug
    ? `<img src="${A}${it.slug}.png">`
    : `<span class="nm">${it.name.toUpperCase()}</span>`;
  grid.appendChild(d);
  return d;
});

const cam = document.getElementById('cam');
const slam = document.getElementById('slam');
const punch = document.getElementById('punch');
const counter = document.getElementById('counter');
const ease = (p) => 1 - Math.pow(1 - p, 3);

fitStage();
run((t) => {
  const idx = times.findLastIndex((h) => t >= h);
  els.forEach((el, i) => {
    el.classList.toggle('on', i <= idx);
    el.classList.toggle('fresh', i === idx && t < T_SLAM && t - times[i] < 0.5);
  });

  /* the whole section is ONE camera move: 3.4x on the first card → 1.0 at the slam */
  const p = ease(Math.min(1, t / T_SLAM));
  cam.style.transform = `scale(${3.4 - 2.4 * p})`;

  grid.classList.toggle('dimmed', t >= T_SLAM);
  vis(slam, t >= T_SLAM);

  const cp = Math.min(1, t / T_SLAM);
  counter.textContent = String(Math.round(90 + 80 * cp * cp)).padStart(3, '0');
  const k = impulse(t, times, 0.16) * 0.02 + impulse(t, [T_SLAM], 0.3) * 0.08;
  punch.style.transform = `scale(${1 + k})`;
}, LOOP);
</script>
</body>
</html>
